<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>recapsule</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* palette pulled from the logo art */
    --map-rose:   #c9b3a8;
    --map-rose-d: #b89c8d;
    --map-deep:   #9c7d6b;
    --ring-brown: #8a6a55;
    --ink:        #3a3330;
    --scroll-1:   #f6efce;
    --scroll-2:   #ece2b0;
    --scroll-3:   #d9c98a;
    --band:       #e7d79a;
    --band-d:     #c9b270;
    --red-x:      #d65668;
    --burnt:      #3d2415;
    --paper:      #efe2c6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #1a1a1f;
    font-family: 'Caveat', cursive;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- center the phone in the viewport ---- */
  .stage {
    height: 100%;
    display: grid;
    place-items: center;
    background:
      radial-gradient(120% 120% at 50% 0%, #26242b 0%, #141318 70%, #0d0c10 100%);
  }

  /* ---- the phone shell ---- */
  .phone {
    position: relative;
    height: min(844px, 96vh);
    width: auto;
    aspect-ratio: 390 / 844;
    border-radius: 54px;
    background: #0b0b0d;
    padding: 11px;
    box-shadow:
      0 0 0 2px #2a2a2e,
      0 30px 70px -20px rgba(0,0,0,0.8),
      0 8px 20px rgba(0,0,0,0.6);
  }

  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 44px;
    overflow: clip;            /* clip (not hidden) so the screen can never be scrolled */
    background: #fffdf9;
    isolation: isolate;
  }

  /* notch / dynamic island */
  .island {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 112px; height: 32px;
    background: #000;
    border-radius: 20px;
    z-index: 60;
  }

  /* =========================================================
     LAYER 1 — the burnt vintage map (revealed underneath)
     ========================================================= */
  .map {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0;
    background:
      /* light tea-stain blotches for an aged, mottled feel */
      radial-gradient(22% 15% at 24% 28%, rgba(120,82,48,0.13), rgba(120,82,48,0) 70%),
      radial-gradient(26% 19% at 78% 66%, rgba(110,74,44,0.12), rgba(110,74,44,0) 70%),
      radial-gradient(18% 14% at 30% 80%, rgba(96,64,38,0.10), rgba(96,64,38,0) 70%),
      /* base: bright parchment center, darkening to burnt brown at the edges */
      radial-gradient(118% 118% at 50% 44%,
        #ecdcbd 0%, #e1ceaa 42%, #cdb389 66%, #a07e5a 86%, #6b4a30 100%);
    /* charred frame — light enough to keep the field crisp */
    box-shadow:
      inset 0 0 60px 8px rgba(48,28,12,0.50),
      inset 0 0 22px 2px rgba(28,15,6,0.55);
  }

  /* static charred dark vignette at the edges (no animation) */
  .map::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 118% at 50% 47%,
        rgba(60,36,18,0) 54%,
        rgba(60,36,18,0.18) 68%,
        rgba(45,26,12,0.45) 84%,
        rgba(28,15,6,0.78) 95%,
        rgba(16,8,3,0.9) 100%);
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  /* hand-inked treasure-map features painted on the parchment */
  .map-art {
    position: absolute;
    inset: 0;
    z-index: 2;
    opacity: 0;
    pointer-events: none;
  }

  /* =========================================================
     LAYER 2 — intro text
     ========================================================= */
  .intro-text {
    position: absolute;
    inset: 0;
    z-index: 30;
    pointer-events: none;
  }
  .tagline {
    position: absolute;
    top: 14%; left: 0; right: 0;
    text-align: center;
    font-size: 34px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(8px) rotate(-2deg);
    animation: textIn .7s ease-out .25s forwards, textOut .5s ease-in 1.7s forwards;
  }
  .wordmark {
    position: absolute;
    bottom: 13%; left: 0; right: 0;
    text-align: center;
    font-family: 'Dancing Script', cursive;
    font-size: 64px;
    font-weight: 700;
    color: var(--ink);
    opacity: 0;
    transform: translateY(10px);
    animation: textIn .7s ease-out .5s forwards, textOut .5s ease-in 1.7s forwards;
  }
  @keyframes textIn  { to { opacity:1; transform: translateY(0) rotate(-2deg); } }
  @keyframes textOut { to { opacity:0; transform: translateY(-6px) rotate(-2deg); } }

  /* =========================================================
     LAYER 3 — the logo badge that expands & "eats" the page
     ========================================================= */
  .badge-wrap {
    position: absolute;
    top: 50%; left: 50%;
    z-index: 20;
    width: 230px; height: 230px;
    transform: translate(-50%, -50%) scale(0.55);
    opacity: 0;
    transform-origin: center center;
    /* phases: pop-in -> hold -> expand to eat page -> fade out (hands off to crisp resting scroll) */
    animation:
      badgePop   .8s cubic-bezier(.34,1.56,.64,1) .15s forwards,
      badgeEat   1.7s cubic-bezier(.7,0,.3,1) 2.0s forwards,
      badgeFade  .55s ease-in 3.55s forwards;
  }
  @keyframes badgeFade { to { opacity: 0; } }
  @keyframes badgePop {
    0%   { opacity:0; transform: translate(-50%,-50%) scale(0.45) rotate(-8deg); }
    100% { opacity:1; transform: translate(-50%,-50%) scale(1) rotate(0deg); }
  }
  /* scale far past the screen so the circle interior becomes the full background */
  @keyframes badgeEat {
    0%   { transform: translate(-50%,-50%) scale(1)   rotate(0deg); }
    100% { transform: translate(-50%,-50%) scale(7.0) rotate(6deg); }
  }

  .badge { width:100%; height:100%; display:block; transform-origin:center; }

  /* the badge's own ring/speckles fade as the real map takes over,
     so the expansion reads as the interior "becoming" the map */
  .badge .ring,
  .badge .badge-bg,
  .badge .speckles { animation: fadeOut .8s ease-in 2.7s forwards; }
  @keyframes fadeOut { to { opacity: 0; } }

  /* the scroll settles back to readable size after the badge blows up */
  .scroll-grp {
    transform-origin: 115px 118px;
    animation: scrollSettle 1.7s cubic-bezier(.7,0,.3,1) 2.0s forwards;
  }
  /* counter-scale: badge goes x7, scroll shrinks ~x1/4.2 -> ends a touch bigger than start */
  @keyframes scrollSettle {
    0%   { transform: scale(1)    rotate(0deg); }
    100% { transform: scale(0.22) rotate(-6deg); }
  }

  /* the treasure path + X drift outward & fade as page is eaten */
  .map-marks { animation: marksOut 1.4s ease-out 2.1s forwards; }
  @keyframes marksOut { to { opacity:0; transform: scale(1.25); } }

  /* gentle idle bob for the settled scroll (kicks in after intro) */
  .idle-bob { animation: bob 4.5s ease-in-out 4.0s infinite; transform-origin:center; }
  @keyframes bob {
    0%,100% { transform: translateY(0) rotate(-6deg); }
    50%     { transform: translateY(-6px) rotate(-5deg); }
  }

  /* reveal the map near the end of the eat phase */
  .map     { animation: mapIn 1.2s ease-out 2.6s forwards; }
  .map-art { animation: mapIn 1.4s ease-out 3.0s forwards; }
  @keyframes mapIn { to { opacity:1; } }

  /* =========================================================
     the crisp resting capsule (its own full-size element, so it
     stays sharp — the giant scaled badge just fades out behind it)
     ========================================================= */
  .home-scroll {
    position: absolute;
    left: 50%; top: 50%;
    width: 272px; z-index: 18;             /* matches the settled badge scroll size */
    transform: translate(-50%, calc(-50% + 22px));
    opacity: 0;
    filter: drop-shadow(0 6px 10px rgba(60,40,20,0.28));
    animation: homeScrollIn .55s ease-out 3.55s forwards;
  }
  @keyframes homeScrollIn { to { opacity: 1; } }
  .home-scroll .bob {
    transform-box: fill-box; transform-origin: center;
    transform: rotate(-6deg);              /* matches the badge scroll's resting tilt */
    animation: hsBob 4.6s ease-in-out 4.3s infinite;
  }
  @keyframes hsBob {
    0%,100% { transform: translateY(0)    rotate(-6deg); }
    50%     { transform: translateY(-6px) rotate(-5deg); }
  }

  @keyframes promptIn { to { opacity: 1; } }

  /* ---- bottom action dock: shovel buttons ---- */
  .dock {
    position: absolute; left: 0; right: 0; bottom: 34px;
    z-index: 44;
    display: flex; justify-content: center; gap: 26px;
    opacity: 0;
    animation: promptIn .9s ease-out 4.2s forwards;
  }
  .tool {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    background: rgba(248,239,213,0.85);
    border: 1.6px solid #b9a463;
    border-radius: 18px;
    padding: 11px 18px 9px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(40,22,10,0.22);
    transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .tool:hover  { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(40,22,10,0.28); background: rgba(251,244,222,0.96); }
  .tool:active { transform: translateY(1px) scale(.97); }
  .tool svg { width: 34px; height: 38px; display: block; overflow: visible; }
  .tool-label { font-family: 'Caveat', cursive; font-size: 18px; font-weight: 700; color: #4f3924; line-height: 1; }

  /* idle digging motion on the shovels (faster on hover) */
  .shovel { transform-box: fill-box; transform-origin: center; }
  .tool-bury .shovel { animation: digDown 2.6s ease-in-out infinite; }
  .tool-dig  .shovel { animation: digUp   2.6s ease-in-out infinite; }
  .tool:hover .shovel { animation-duration: 1s; }
  @keyframes digDown { 0%,68%,100% { transform: translateY(0) rotate(0); } 84% { transform: translateY(3px) rotate(4deg); } }
  @keyframes digUp   { 0%,68%,100% { transform: translateY(0) rotate(0); } 84% { transform: translateY(-3px) rotate(-4deg); } }

  /* ---- compass button, top-right corner ---- */
  .compass-btn {
    position: absolute; top: 16px; right: 12px; z-index: 45;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    background: none; border: none; cursor: pointer; padding: 0;
    opacity: 0;
    animation: promptIn 1s ease-out 4.4s forwards;
    -webkit-tap-highlight-color: transparent;
  }
  .compass-btn svg {
    width: 52px; height: 52px; display: block;
    filter: drop-shadow(0 2px 3px rgba(40,22,10,.35));
    transition: transform .3s ease;
  }
  .compass-btn:hover svg { transform: scale(1.07); }
  .compass-btn:active svg { transform: scale(.96); }
  .compass-needle {
    transform-box: fill-box; transform-origin: center;
    animation: needleSway 4.2s ease-in-out infinite;
  }
  .compass-btn:hover .compass-needle { animation: needleSpin 1.1s cubic-bezier(.3,0,.2,1); }
  @keyframes needleSway { 0%,100%{transform:rotate(-13deg);} 50%{transform:rotate(15deg);} }
  @keyframes needleSpin { from{transform:rotate(0);} to{transform:rotate(360deg);} }
  .compass-cap {
    font-family: 'Caveat', cursive; font-size: 13.5px; font-weight: 700;
    color: #4f3924; line-height: 1.05; max-width: 82px; text-align: center;
    text-shadow: 0 1px 0 rgba(255,250,235,0.65);
    transform: rotate(-3deg);
  }

  /* ---- gesture acknowledgement toast (placeholder until screens exist) ---- */
  .toast {
    position: absolute; left: 50%; top: 50%; z-index: 55;
    transform: translate(-50%,-50%) translateY(12px);
    font-family: 'Caveat', cursive; font-size: 27px; font-weight: 700;
    color: #3a2410; background: rgba(247,238,210,0.94);
    border: 1.5px solid #b9a463; border-radius: 14px;
    padding: 9px 20px; opacity: 0; pointer-events: none; white-space: nowrap;
    box-shadow: 0 8px 22px rgba(40,22,10,.35);
    transition: opacity .25s ease, transform .25s ease;
  }
  .toast.show { opacity: 1; transform: translate(-50%,-50%) translateY(0); }

  /* =========================================================
     BURY FLOW  (camera → dig → bury → success)
     ========================================================= */
  .bury {
    position: absolute; inset: 0; z-index: 80;
    overflow: hidden;
    opacity: 0; visibility: hidden;
    transition: opacity .35s ease, visibility .35s;
    background: #0c0b0f;
  }
  .bury.open { opacity: 1; visibility: visible; }

  /* live camera feed (and fallback) fill the screen for the AR phases */
  .cam, .cam-fallback {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover;
  }
  .cam-fallback {
    /* sky-over-ground viewfinder shown when there's no camera */
    background:
      linear-gradient(180deg, #acc7e0 0%, #c4d6e6 42%, #d8c6a4 58%, #9a6b3e 78%, #6e4827 100%);
  }
  .cam-fallback::after {
    /* a faint horizon shimmer so the fallback feels live */
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(60% 30% at 50% 55%, rgba(255,255,255,.18), transparent 70%);
    animation: camPulse 4s ease-in-out infinite;
  }
  @keyframes camPulse { 0%,100%{opacity:.5;} 50%{opacity:.9;} }
  .bury.has-cam .cam-fallback { display: none; }
  .bury[data-phase="success"] .cam,
  .bury[data-phase="success"] .cam-fallback,
  .bury[data-phase="success"] .cam-scrim { display: none; }

  /* darken slightly so white text reads over any camera image */
  .cam-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(0,0,0,.55) 0%, rgba(0,0,0,.32) 22%, rgba(0,0,0,0) 42%,
      rgba(0,0,0,0) 60%, rgba(0,0,0,.5) 100%);
    pointer-events: none;
  }

  .bury-close {
    position: absolute; top: 14px; left: 14px; z-index: 30;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(0,0,0,.4); color: #fff; border: none;
    font-size: 20px; line-height: 1; cursor: pointer;
    backdrop-filter: blur(2px);
  }
  .bury[data-phase="success"] .bury-close { display: none; }

  /* phase blocks: only the active phase shows */
  .bphase { position: absolute; inset: 0; display: none; }
  .bury[data-phase="choose"]  .b-choose  { display: block; }
  .bury[data-phase="dig"]     .b-dig     { display: block; }
  .bury[data-phase="success"] .b-success { display: flex; }

  /* shared big banner text at the top */
  .b-banner {
    position: absolute; top: 56px; left: 0; right: 0;
    text-align: center; padding: 0 36px;
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 26px;
    color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,.85), 0 0 14px rgba(0,0,0,.5);
  }

  /* ---- phase: choose ---- (title + sub stack in a flow column so they can't overlap) */
  .b-choose { display: none; }
  .b-choose-text {
    position: absolute; top: 8%; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    padding: 0 34px; text-align: center;
  }
  .b-title {
    margin: 0; line-height: 1.05;
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 40px;
    color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,.9), 0 0 18px rgba(0,0,0,.55);
    animation: bFadeUp .7s ease-out both;
  }
  .b-sub {
    margin: 0; line-height: 1.18;
    font-family: 'Caveat', cursive; font-size: 21px; color: #fff;
    text-shadow: 0 2px 5px rgba(0,0,0,.9), 0 0 14px rgba(0,0,0,.55);
    animation: bFadeUp .7s ease-out .2s both;
  }
  .b-reticle {
    position: absolute; top: 58%; left: 50%; width: 190px; height: 190px;
    transform: translate(-50%,-50%);
    border: 2px dashed rgba(255,255,255,.7); border-radius: 26px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,.12);
    animation: reticle 2.4s ease-in-out infinite;
  }
  .b-reticle span { position:absolute; width:18px; height:18px; border:3px solid #fff; }
  .b-reticle span:nth-child(1){ top:-2px; left:-2px; border-right:0; border-bottom:0; border-top-left-radius:8px;}
  .b-reticle span:nth-child(2){ top:-2px; right:-2px; border-left:0; border-bottom:0; border-top-right-radius:8px;}
  .b-reticle span:nth-child(3){ bottom:-2px; left:-2px; border-right:0; border-top:0; border-bottom-left-radius:8px;}
  .b-reticle span:nth-child(4){ bottom:-2px; right:-2px; border-left:0; border-top:0; border-bottom-right-radius:8px;}
  @keyframes reticle { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8;} 50%{transform:translate(-50%,-50%) scale(1.05);opacity:1;} }
  @keyframes bFadeUp { from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }

  /* ---- phase: dig (tap repeatedly, hole grows, then bury) ---- */
  .b-dig { display: none; }
  .digzone {
    position: absolute; left: 50%; bottom: 60px; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; transition: opacity .35s ease, transform .35s ease;
  }
  .digzone.hide { opacity: 0; transform: translateX(-50%) translateY(22px) scale(.85); pointer-events: none; }
  .big-shovel { width: 138px; height: 194px; display:block; filter: drop-shadow(0 8px 12px rgba(0,0,0,.45)); }
  .big-shovel .blade-grp { transform-box: fill-box; transform-origin: center; animation: shovelHover 2.6s ease-in-out infinite; }
  @keyframes shovelHover { 0%,100%{transform:translateY(0) rotate(0);} 50%{transform:translateY(-7px) rotate(-2deg);} }
  .dig-label {
    font-family:'Caveat',cursive; font-weight:700; font-size:24px; color:#fff; white-space:nowrap;
    background: rgba(176,72,90,.92); padding: 6px 20px; border-radius: 16px;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
    animation: tapPulse 1.4s ease-in-out infinite;
  }
  @keyframes tapPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
  /* one shovel stab per tap */
  .digzone.stab .blade-grp { animation: shovelStab .4s ease-in-out; }
  @keyframes shovelStab { 0%{transform:translateY(0);} 45%{transform:translateY(30px) rotate(1deg);} 100%{transform:translateY(0);} }

  /* ---- the hole — grows with each tap (JS sets the scale, CSS eases it) ---- */
  .hole-wrap {
    position: absolute; left: 50%; bottom: 84px; transform: translateX(-50%);
    width: 270px; height: 150px; pointer-events: none;
  }
  .mound, .hole, .hole-rim { transition: transform .42s cubic-bezier(.2,.8,.3,1); }
  .mound {
    position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%) scale(0);
    width: 286px; height: 120px; border-radius: 50%;
    background: radial-gradient(ellipse at 50% 40%, #8a5a2e 0%, #6e4827 60%, #5a3a20 100%);
    box-shadow: 0 8px 18px rgba(0,0,0,.4);
  }
  .hole {
    position: absolute; left: 50%; bottom: 26px; transform: translate(-50%,0) scale(0);
    width: 230px; height: 116px; border-radius: 50%;
    background: radial-gradient(ellipse at 50% 32%, #140b04 0%, #2b1a0e 34%, #4a2f18 64%, #6b4423 90%, #7d5128 100%);
    box-shadow: inset 0 14px 22px rgba(0,0,0,.75), inset 0 -6px 10px rgba(120,80,40,.4);
  }
  .hole-rim {
    position:absolute; left:50%; bottom:20px; transform:translateX(-50%) scale(0);
    width:244px; height:128px; border-radius:50%;
    border: 6px solid #5a3a20; opacity:.5;
  }

  /* the capsule to bury */
  .capsule-btn {
    position: absolute; left: 50%; bottom: 150px; transform: translateX(-50%);
    background: none; border: none; cursor: pointer; padding: 0;
    opacity: 0; pointer-events: none;
    -webkit-tap-highlight-color: transparent;
  }
  .capsule-btn svg { width: 230px; display: block; filter: drop-shadow(0 10px 12px rgba(0,0,0,.45)); }
  .b-dig.ready .capsule-btn { pointer-events: auto; animation: capRise .6s ease-out .15s forwards; }
  @keyframes capRise { from{opacity:0; transform:translateX(-50%) translateY(-26px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }
  .b-dig.ready .capsule-btn .cap-bob { transform-box: fill-box; transform-origin:center; animation: hsBob 3.8s ease-in-out .8s infinite; }
  /* burying: capsule drops into the hole */
  .b-dig.burying .capsule-btn { animation: capDrop .8s cubic-bezier(.5,0,.8,1) forwards; }
  @keyframes capDrop {
    0%   { opacity:1; transform: translateX(-50%) translateY(0)   scale(1)   rotate(-4deg); }
    100% { opacity:0; transform: translateX(-50%) translateY(150px) scale(.45) rotate(-10deg); }
  }

  /* dirt particles */
  .dirt { position:absolute; inset:0; pointer-events:none; }
  .speck {
    position:absolute; width:8px; height:8px; border-radius:2px;
    background:#6e4827; opacity:0;
  }
  .speck.go { animation: fly .7s ease-out forwards; }
  @keyframes fly {
    0%   { opacity:1; transform: translate(0,0) rotate(0); }
    100% { opacity:0; transform: translate(var(--fx), var(--fy)) rotate(var(--fr)); }
  }

  /* ---- phase: success ---- */
  .b-success {
    display: none; flex-direction: column; align-items: center; justify-content: flex-start;
    background:
      radial-gradient(120% 90% at 50% 0%, #fffdf7 0%, #f3ead4 70%, #e7d8b6 100%);
    padding-top: 60px;
  }
  .success-title {
    font-family:'Caveat',cursive; font-weight:700; font-size:58px;
    color:#e6b422; text-shadow: 1px 2px 0 #b8860b22, 0 3px 10px rgba(180,120,10,.25);
    letter-spacing:1px; transform: rotate(-2deg);
    animation: pop .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop { from{opacity:0; transform:scale(.6) rotate(-2deg);} to{opacity:1; transform:scale(1) rotate(-2deg);} }
  .success-art { width: 88%; max-width: 340px; margin-top: 6px; animation: bFadeUp .6s ease-out .25s both; }
  .b-loc {

  <script>
    // ---- button actions (placeholder feedback until the screens exist) ----
    const toast = document.getElementById('toast');
    let _toastTimer;
    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
    }
    // TODO: replace these with navigation to the real screens
    document.getElementById('digBtn').addEventListener('click',  () => showToast('digging up an old capsule…'));
    document.getElementById('compassBtn').addEventListener('click', () => showToast('find your principles…'));

    // once the intro hands off to the crisp resting capsule, retire the
    // giant scaled badge so it stops creating layout overflow.
    setTimeout(() => {
      const bw = document.querySelector('.badge-wrap');
      if (bw) bw.style.display = 'none';
    }, 4300);

    // ============ BURY FLOW ============
    const bury     = document.getElementById('bury');
    const bDig     = document.getElementById('bDig');
    const digzone  = document.getElementById('digzone');
    const hole     = document.getElementById('hole');
    const holeRim  = document.getElementById('holeRim');
    const mound    = document.getElementById('mound');
    const digLabel = document.getElementById('digLabel');
    const digBanner= document.getElementById('digBanner');
    let camStream = null;
    let chooseTimer = null;

    // ---- multi-tap digging ----
    const TARGET_DIGS = 4;          // taps needed to dig the hole
    let digCount = 0;
    const DIG_PROMPTS = ['tap to dig', 'dig deeper!', 'keep digging!', 'almost there!'];
    const BANNER_PROMPTS = [
      'point the camera at the ground',
      'nice — keep tapping to dig deeper!',
      'deeper… you’ve got this!',
      'almost deep enough!'
    ];
    function setHoleProgress(p){
      mound.style.transform   = `translateX(-50%) scale(${p})`;
      holeRim.style.transform = `translateX(-50%) scale(${p})`;
      hole.style.transform    = `translate(-50%,0) scale(${p})`;
    }
    function resetDig(){
      digCount = 0;
      setHoleProgress(0);
      digLabel.textContent  = DIG_PROMPTS[0];
      digBanner.textContent = BANNER_PROMPTS[0];
      bDig.classList.remove('dug','ready','burying');
      digzone.classList.remove('hide','stab');
    }

    async function startCamera(){
      try {
        camStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } }, audio: false
        });
        const cam = document.getElementById('cam');
        cam.srcObject = camStream;
        await cam.play().catch(() => {});
        bury.classList.add('has-cam');
      } catch (e) {
        bury.classList.remove('has-cam');   // fall back to the viewfinder gradient
      }
    }
    function stopCamera(){
      if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
    }
    const setPhase = p => { bury.dataset.phase = p; };

    function openBury(){
      resetDig();
      setPhase('choose');
      bury.classList.add('open');
      startCamera();
      clearTimeout(chooseTimer);
      chooseTimer = setTimeout(() => { if (bury.dataset.phase === 'choose') setPhase('dig'); }, 2800);
    }
    function closeBury(){
      bury.classList.remove('open');
      stopCamera();
      clearTimeout(chooseTimer);
    }

    document.getElementById('buryBtn').addEventListener('click', openBury);
    document.getElementById('buryClose').addEventListener('click', closeBury);
    document.getElementById('buryDone').addEventListener('click', closeBury);

    // each tap digs the hole a little deeper
    function doDig(){
      if (bDig.classList.contains('dug')) return;
      digCount++;
      // replay the shovel stab
      digzone.classList.remove('stab'); void digzone.offsetWidth; digzone.classList.add('stab');
      spray(10);
      setHoleProgress(Math.min(digCount / TARGET_DIGS, 1));
      if (digCount >= TARGET_DIGS){
        bDig.classList.add('dug');
        digBanner.textContent = 'tap the capsule to bury it';
        setTimeout(() => digzone.classList.add('hide'), 220);   // shovel steps aside
        setTimeout(() => bDig.classList.add('ready'), 480);     // capsule rises
      } else {
        digLabel.textContent  = DIG_PROMPTS[Math.min(digCount, DIG_PROMPTS.length - 1)];
        digBanner.textContent = BANNER_PROMPTS[Math.min(digCount, BANNER_PROMPTS.length - 1)];
      }
    }
    digzone.addEventListener('click', doDig);

    // tap capsule to bury it
    document.getElementById('capsuleBtn').addEventListener('click', () => {
      if (!bDig.classList.contains('ready') || bDig.classList.contains('burying')) return;
      bDig.classList.add('burying');
      setTimeout(() => spray(18), 520);
      setTimeout(() => { stopCamera(); setPhase('success'); renderSuccess(); }, 1150);
    });

    // dirt particles flung out of the hole
    function spray(n){
      const dirt = document.getElementById('dirt');
      const rect = bury.getBoundingClientRect();
      const cx = rect.width / 2;
      const cy = rect.height - 150;
      for (let i = 0; i < n; i++){
        const s = document.createElement('div');
        s.className = 'speck';
        s.style.left = (cx - 4 + (Math.random()*60 - 30)) + 'px';
        s.style.top  = (cy + (Math.random()*16 - 8)) + 'px';
        const ang  = -Math.PI/2 + (Math.random() - 0.5) * 1.7;   // mostly upward
        const dist = 55 + Math.random()*95;
        s.style.setProperty('--fx', Math.cos(ang)*dist + 'px');
        s.style.setProperty('--fy', Math.sin(ang)*dist + 'px');
        s.style.setProperty('--fr', (Math.random()*540 - 270) + 'deg');
        const sz = 5 + Math.random()*7;
        s.style.width = sz + 'px'; s.style.height = sz + 'px';
        dirt.appendChild(s);
        requestAnimationFrame(() => s.classList.add('go'));
        setTimeout(() => s.remove(), 760);
      }
    }

    // success: plot the user's location on the world map
    function renderSuccess(){
      const setPin = (lat, lon, label) => {
        const x = 48 + (lon + 180) * 0.733;   // matches the continents transform
        const y = 40 + (90  - lat) * 0.778;
        ['pinHalo','pinRing','pinDot'].forEach(id => {
          const el = document.getElementById(id);
          el.setAttribute('cx', x); el.setAttribute('cy', y);
        });
        const conn = document.getElementById('connector');
        conn.setAttribute('x2', x); conn.setAttribute('y2', y + 8);
        document.getElementById('bLoc').textContent = label;
      };
      const fallback = () => setPin(41.31, -72.92, 'pinned to your spot · New Haven, CT');
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => setPin(pos.coords.latitude, pos.coords.longitude,
                        `pinned to your spot · ${pos.coords.latitude.toFixed(3)}, ${pos.coords.longitude.toFixed(3)}`),
          () => fallback(),
          { timeout: 4000, maximumAge: 600000 }
        );
      } else fallback();
    }
</script>
</body>
</html>
